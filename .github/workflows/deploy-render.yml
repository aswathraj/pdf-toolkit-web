name: Deploy To Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  trigger-render-deploy:
    runs-on: ubuntu-latest
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

    steps:
      - name: Skip when deploy hook is not configured
        if: ${{ env.RENDER_DEPLOY_HOOK_URL == '' }}
        run: echo "RENDER_DEPLOY_HOOK_URL is not configured. Skipping Render deploy trigger."

      - name: Trigger Render deploy
        if: ${{ env.RENDER_DEPLOY_HOOK_URL != '' }}
        run: curl --fail --silent --show-error --request POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
